<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Michael · 投資筆記</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2330;--bd:#30363d;--tx:#e6edf3;--mut:#8b949e;
--g:#3fb950;--r:#f85149;--y:#d29922;--b:#58a6ff;--p:#bc8cff;--accent:#2f81f7;}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0d1117,#0b0f14);color:var(--tx);
font-family:-apple-system,"PingFang TC","Helvetica Neue",Arial,sans-serif;line-height:1.65}
a{color:var(--b);text-decoration:none}
a:hover{text-decoration:underline}

.layout{display:flex;align-items:flex-start;max-width:1080px;margin:0 auto;gap:0}

/* 左側文章列表 */
.sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--bd);
min-height:100vh;padding:28px 20px;position:sticky;top:0}
.sidebar .brand{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:4px}
.sidebar .brand-sub{font-size:12px;color:var(--mut);margin-bottom:20px}
.sidebar h2{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;
margin:0 0 12px;font-weight:600}
.nav-post{display:block;padding:11px 13px;border:1px solid var(--bd);border-radius:10px;
margin-bottom:10px;background:var(--card);transition:border-color .15s,background .15s}
.nav-post:hover{border-color:var(--accent);background:var(--card2);text-decoration:none}
.nav-post .np-meta{font-size:11px;color:var(--mut);margin-bottom:4px}
.nav-post .np-tag{font-size:10px;padding:1px 7px;border-radius:5px;font-weight:600;
background:#1a2e3b;color:#56b6ff;margin-right:6px}
.nav-post .np-title{font-size:14px;color:var(--tx);font-weight:600;line-height:1.4}

/* 右側主內容 */
.content{flex:1;min-width:0;padding:64px 48px 80px}
.content .hero h1{font-size:34px;margin:0 0 14px;letter-spacing:.5px}
.content .hero .sub{color:var(--mut);font-size:16px;max-width:620px;line-height:1.7}
.content .about{margin-top:32px;color:#cdd9e5;font-size:14.5px;max-width:620px}

.links{margin-top:30px}
.links a{display:inline-flex;align-items:center;gap:9px;background:#0a66c2;color:#fff;
border:1px solid #0a66c2;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600}
.links a:hover{background:#0959aa;border-color:#0959aa;text-decoration:none}
.links a svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.links .ln-sub{font-weight:400;opacity:.85;font-size:12px;margin-left:2px}

.foot{margin-top:64px;padding-top:18px;border-top:1px solid var(--bd);
color:var(--mut);font-size:12px}

@media(max-width:760px){
.layout{flex-direction:column}
.sidebar{width:100%;min-height:0;position:static;border-right:0;border-bottom:1px solid var(--bd)}
.content{padding:36px 22px 60px}
.content .hero h1{font-size:28px}
}
</style></head><body>

<div class="layout">

  <aside class="sidebar">
    <div class="brand">Michael 的投資筆記</div>
    <div class="brand-sub">Investment Notes</div>
    <h2>文章</h2>

    <a class="nav-post" href="posts/power-semiconductor.html">
      <div class="np-meta"><span class="np-tag">產業分析</span>2026-06-19</div>
      <div class="np-title">功率半導體三段價值鏈 · 深度分析</div>
    </a>

  </aside>

  <main class="content">
    <div class="hero">
      <h1>Michael 的投資筆記</h1>
      <div class="sub">產業鏈拆解 · 估值檢驗 · 循環判斷。以 forward PE 為錨，搭配獨立研報交叉驗證，記錄我對個股與產業的研究。</div>
    </div>

    <div class="about">
      左側是文章列表，點選即可閱讀。每篇筆記都以「先判產業循環烈度、再用前瞻估值交叉驗證」的框架撰寫，不採用賣方分析師目標價。
    </div>

    <div class="links">
      <a href="https://www.linkedin.com/in/hc-hsieh-michael" target="_blank" rel="noopener">

        <span>LinkedIn<span class="ln-sub"> · hc-hsieh-michael</span></span>
      </a>
    </div>

    <div class="foot">© 2026 Michael · 本站內容僅為個人研究筆記，不構成投資建議。</div>
  </main>

</div>

</body></html>
